jobs:
  repo-server_plugins:
    env:
      BASE64build: 
      BASE64docker: RlJPTSBhbHBpbmU6My4xNgoKV09SS0RJUiAvcGx1Z2lucwoKQ09QWSBjYWNoZWQvIC8K
      GITHUB_REPO: argocd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "~1.21"
      - name: Build artifacts
        run: |-
          echo ${{ env.BASE64build }} | base64 -d >build
          docker run --rm --entrypoint sh -v "$PWD/cached:/cached" "${{ secrets.DOCKERHUB_USERNAME }}/${GITHUB_REPO,,}:plugins" -c "cp -a /plugins /cached"
          sudo chown -R $USER cached
          cd cached/plugins && {
          version=$(curl -fsSL https://api.github.com/repos/dalance/procs/releases/latest | jq -r .tag_name | sed 's~v~~')
          wget -Oout https://github.com/dalance/procs/releases/download/v$version/procs-v$version-x86_64-linux.zip && unzip -o out && rm out
          version=$(curl -fsSL https://api.github.com/repos/ClementTsang/bottom/releases/latest | jq -r .tag_name | sed 's~v~~')
          wget -O- https://github.com/ClementTsang/bottom/releases/download/$version/bottom_x86_64-unknown-linux-musl.tar.gz | tar -xz btm
          version=$(curl -fsSL https://api.github.com/repos/ajeetdsouza/zoxide/releases/latest | jq -r .tag_name | sed 's~v~~')
          wget -O- https://github.com/ajeetdsouza/zoxide/releases/download/v$version/zoxide-$version-x86_64-unknown-linux-musl.tar.gz | tar -xz zoxide
          cd -
          }
          docker run --label type=build -d --name linux -v "$PWD/cached:/cached" -v "$PWD/build:/build:ro" -w / alpine:edge sh /build
          until [ -z "$(docker ps --filter status=running --filter label=type=build --quiet)" ]; do sleep 3; done
          docker logs -t linux
      - name: Docker
        run: |-
          cat "cached/plugins/.use-versions"
          if [[ -s "cached/.upload" ]]; then
            echo ${{ env.BASE64docker }} | base64 -d >Dockerfile
            docker build --no-cache --pull . --tag "${{ secrets.DOCKERHUB_USERNAME }}/${GITHUB_REPO,,}:action"
            docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password ${{ secrets.DOCKERHUB_PASSWORD }}
            docker push "${{ secrets.DOCKERHUB_USERNAME }}/${GITHUB_REPO,,}" --all-tags
            docker logout
          fi
name: Argo-CD
on:
  workflow_dispatch:
